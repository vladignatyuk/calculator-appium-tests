[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v
markers =
    smoke: minimal set of tests proving core happy paths still work; fast sanity check (pytest -m smoke)
    negative: tests verifying graceful handling of invalid/unexpected input (pytest -m negative)
    boundary: tests targeting the exact boundary between two equivalence classes (e.g. last-digit backspace, 0%)
